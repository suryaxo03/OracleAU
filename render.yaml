services:
  - type: web
    name: oracleau-api
    runtime: python
    region: frankfurt          # Closest to LSE / UK data
    plan: free

    buildCommand: pip install -r requirements.txt

    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "3"             # Suppress TensorFlow noise in logs

    healthCheckPath: /health   # Render pings this to verify the service is up